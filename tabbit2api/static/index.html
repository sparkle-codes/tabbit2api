<style>
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
    background: #0a0a0f;
    color: #e4e4e7;
  }
  /* Glassmorphism card */
  .glass {
    background: rgba(255,255,255,0.03);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.06);
  }
  .glass-hover:hover {
    background: rgba(255,255,255,0.05);
    border-color: rgba(255,255,255,0.1);
  }
  /* Gradient text */
  .grad-text {
    background: linear-gradient(135deg, #818cf8, #6366f1, #a78bfa);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  /* Gradient border card */
  .grad-border {
    position: relative;
    background: rgba(255,255,255,0.02);
    border-radius: 16px;
  }
  .grad-border::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 16px;
    padding: 1px;
    background: linear-gradient(135deg, rgba(99,102,241,0.3), rgba(167,139,250,0.15), transparent);
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
    mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    mask-composite: exclude;
    pointer-events: none;
  }
  /* Status dots */
  .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
  .status-active { background: #34d399; box-shadow: 0 0 8px #34d39977; }
  .status-error { background: #f87171; box-shadow: 0 0 8px #f8717177; }
  .status-unknown { background: #a1a1aa; }
  .status-cooldown { background: #fbbf24; box-shadow: 0 0 8px #fbbf2477; }
  /* Animations */
  .fade-in { animation: fadeIn .25s ease-out; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
  .slide-in { animation: slideIn .3s ease-out; }
  @keyframes slideIn { from { opacity: 0; transform: translateX(-8px); } to { opacity: 1; transform: none; } }
  /* Inputs */
  input, select, textarea {
    transition: border-color .15s, box-shadow .15s;
  }
  input:focus, select:focus, textarea:focus {
    outline: none;
    border-color: rgba(99,102,241,0.5) !important;
    box-shadow: 0 0 0 3px rgba(99,102,241,0.15);
  }
  /* Nav items */
  .nav-item {
    transition: all .15s;
    position: relative;
  }
  .nav-item:hover {
    background: rgba(255,255,255,0.04);
    color: #e4e4e7;
  }
  .nav-item.active {
    background: linear-gradient(135deg, rgba(99,102,241,0.15), rgba(167,139,250,0.08));
    color: #a5b4fc;
  }
  .nav-item.active::before {
    content: '';
    position: absolute;
    left: 0; top: 50%;
    transform: translateY(-50%);
    width: 3px; height: 60%;
    border-radius: 0 3px 3px 0;
    background: linear-gradient(180deg, #818cf8, #6366f1);
  }
  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }

  }
  .btn-primary:hover {

    transform: translateY(-1px);
  }
  /* Sidebar glow */
  .sidebar-glow {
    background: linear-gradient(180deg, rgba(99,102,241,0.03) 0%, transparent 30%);
  }
  /* Stat card accent */
  .stat-accent-1 { background: linear-gradient(135deg, rgba(99,102,241,0.08), rgba(99,102,241,0.02)); }
  .stat-accent-2 { background: linear-gradient(135deg, rgba(52,211,153,0.08), rgba(52,211,153,0.02)); }

<body class="min-h-screen">

<div id="app"></div>

<script>
const API = '/api/admin';
let token = localStorage.getItem('admin_token') || '';
let currentPage = 'dashboard';
let autoRefreshTimer = null;

// ── Fetch helpers ──

async function api(path, opts = {}) {
  const headers = { 'Content-Type': 'application/json', ...opts.headers };
  if (token) headers['Authorization'] = `Bearer ${token}`;
  const res = await fetch(API + path, { ...opts, headers });
  if (res.status === 401) {
    token = '';
    localStorage.removeItem('admin_token');
    render();
    throw new Error('unauthorized');
  }
  const data = await res.json();
  if (!res.ok) throw new Error(data.detail || 'request failed');
  return data;
}

// ── Router ──

function navigate(page) {
  currentPage = page;
  if (autoRefreshTimer) { clearInterval(autoRefreshTimer); autoRefreshTimer = null; }
  render();
}

function render() {
  const app = document.getElementById('app');
  if (!token) { app.innerHTML = loginPage(); bindLogin(); return; }
  app.innerHTML = layout();
  bindNav();
  loadPage();
}

// ── Login ──

function loginPage() {
  return `
  <div class="min-h-screen flex items-center justify-center p-4 relative overflow-hidden">
    <!-- Background decoration -->
    <div class="absolute inset-0 overflow-hidden">
      <div class="absolute -top-40 -left-40 w-96 h-96 rounded-full bg-brand-600/10 blur-3xl"></div>
      <div class="absolute -bottom-40 -right-40 w-96 h-96 rounded-full bg-violet-600/10 blur-3xl"></div>
    </div>
    <div class="w-full max-w-sm relative">
      <div class="grad-border p-8 shadow-2xl fade-in">
        <div class="text-center mb-8">
          <div class="inline-flex items-center justify-center w-14 h-14 rounded-xl bg-gradient-to-br from-brand-500 to-brand-700 mb-4 shadow-lg shadow-brand-600/30">
            <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
          </div>
          <h1 class="text-2xl font-bold grad-text">Tabbit2API</h1>
          <p class="text-sm text-zinc-500 mt-1">管理面板登录</p>
        </div>
        <form id="loginForm" class="space-y-5">
          <div>
            <label class="block text-sm font-medium text-zinc-400 mb-1.5">密码</label>
            <input id="loginPwd" type="password" placeholder="输入管理密码" autocomplete="current-password"
              class="w-full rounded-xl border border-white/10 bg-white/5 px-4 py-3 text-sm text-zinc-100 placeholder-zinc-600">
          </div>
          <button type="submit" class="w-full rounded-xl btn-primary px-4 py-3 text-sm font-medium text-white">
            登录
          </button>
          <p id="loginErr" class="text-sm text-red-400 text-center hidden"></p>
        </form>
      </div>
    </div>
  </div>`;
}

function bindLogin() {
  document.getElementById('loginForm').onsubmit = async (e) => {
    e.preventDefault();
    const pwd = document.getElementById('loginPwd').value;
    const errEl = document.getElementById('loginErr');
    try {
      const data = await fetch(API + '/login', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password: pwd })
      }).then(r => r.json());
      if (data.token) {
        token = data.token;
        localStorage.setItem('admin_token', token);
        currentPage = 'dashboard';
        render();
      } else {
        errEl.textContent = data.detail || '登录失败';
        errEl.classList.remove('hidden');
      }
    } catch {
      errEl.textContent = '连接失败';
      errEl.classList.remove('hidden');
    }
  };
}

// ── Layout ──

const navItems = [
  { id: 'dashboard', label: 'Dashboard', icon: '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zm10 0a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zm10 0a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"/>' },
  { id: 'tokens', label: 'Tokens', icon: '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"/>' },
  { id: 'settings', label: 'Settings', icon: '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.066 2.573c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.573 1.066c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.066-2.573c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>' },
  { id: 'logs', label: 'Logs', icon: '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v10a2 2 0 002 2h8a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"/>' },
];

function layout() {
  return `
  <div class="flex min-h-screen">
    <!-- Sidebar -->
    <aside class="w-60 border-r border-white/5 bg-[#0a0a0f] flex flex-col fixed h-screen sidebar-glow z-10">
      <div class="p-6 border-b border-white/5">
        <div class="flex items-center gap-3">
          <div class="inline-flex items-center justify-center w-9 h-9 rounded-lg bg-gradient-to-br from-brand-500 to-brand-700 shadow-lg shadow-brand-600/20">

function logout() {

  render();
}

// ── Pages ──

async function loadPage() {
  const el = document.getElementById('pageContent');
  try {
    switch (currentPage) {
      case 'dashboard': await renderDashboard(el); break;
      case 'tokens': await renderTokens(el); break;
      case 'settings': await renderSettings(el); break;
      case 'logs': await renderLogs(el); break;
    }
  } catch (e) {
    el.innerHTML = `<div class="text-red-400">加载失败: ${e.message}</div>`;
  }
}

function openGoogleOAuth() {
  const params = new URLSearchParams({
    client_id: GOOGLE_CLIENT_ID,
    scope: 'openid email profile',
    response_type: 'id_token',
    redirect_uri: 'gis_transform',
    response_mode: 'form_post',
    origin: TABBIT_ORIGIN,
    display: 'popup',
    prompt: 'select_account',
    gsiwebsdk: 'gis_attributes',
  });
  window.open(
    'https://accounts.google.com/o/oauth2/v2/auth?' + params,
    'google_login',
    'width=520,height=700,left=200,top=80'
  );
}

function submitGoogleIdToken() {
  const val = document.getElementById('glManualToken').value.trim();
  if (!val) return alert('请先粘贴 id_token');
  exchangeGoogleToken(val);
}

async function exchangeGoogleToken(id_token) {
  const step1 = document.getElementById('glStep1');
  const result = document.getElementById('glResult');
  step1.innerHTML = '<div class="flex items-center gap-3 py-6"><svg class="w-5 h-5 animate-spin text-brand-400" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/></svg><span class="text-sm text-zinc-300">正在换取 Tabbit Token...</span></div>';

  try {
    const data = await api('/tokens/google-login', {
      method: 'POST',
      body: JSON.stringify({ id_token })
    });

    step1.style.display = 'none';
    result.style.display = 'block';

    const name = (document.getElementById('glName') ? document.getElementById('glName').value.trim() : '') || 'Google Account';

    result.innerHTML = `
      <div class="rounded-xl bg-emerald-950/30 border border-emerald-800/30 p-4 mb-3">
        <p class="text-sm text-emerald-400 font-medium mb-1">Token 获取成功!</p>
        <p class="text-xs text-zinc-500 font-mono break-all">${esc(data.token_value).substring(0, 60)}...</p>
      </div>
      <button onclick="saveGoogleToken('${esc(name)}', '${esc(data.token_value)}')" class="w-full rounded-xl btn-primary px-4 py-2.5 text-sm font-medium text-white">
        保存为 "${esc(name)}"
      </button>`;
  } catch (e) {
    step1.style.display = 'none';
    result.style.display = 'block';
    result.innerHTML = `<div class="rounded-xl bg-red-950/30 border border-red-800/30 p-4"><p class="text-sm text-red-400">${esc(e.message)}</p></div>`;
  }
}

    closeModal();
    renderTokens(document.getElementById('pageContent'));

}

  try {
    const res = await api(`/tokens/${id}/test`, { method: 'POST' });
    alert(res.ok ? '连接成功!' : `测试失败: ${res.error}`);
  } catch (e) {
    alert('测试失败: ' + e.message);
  }
  renderTokens(document.getElementById('pageContent'));
}

async function toggleToken(id, enabled) {
  await api(`/tokens/${id}`, { method: 'PUT', body: JSON.stringify({ enabled }) });
  renderTokens(document.getElementById('pageContent'));
}

async function deleteToken(id, name) {
  if (!confirm(`确定删除 Token "${name}"?`)) return;
  await api(`/tokens/${id}`, { method: 'DELETE' });
  renderTokens(document.getElementById('pageContent'));
}

async function saveSettings() {

    await api('/settings', {
      method: 'PUT',
      body: JSON.stringify({
        host: document.getElementById('sHost').value,
        port: parseInt(document.getElementById('sPort').value),
        base_url: document.getElementById('sBaseUrl').value,
        client_id: document.getElementById('sClientId').value,
        api_key: document.getElementById('sApiKey').value,
        claude_default_model: document.getElementById('sClaudeModel').value,
        openai_system_prompt: document.getElementById('sOpenaiPrompt').value,
        claude_system_prompt: document.getElementById('sClaudePrompt').value,
        max_entries: parseInt(document.getElementById('sMaxEntries').value),
      })
    });
    alert('设置已保存（端口变更需重启生效）');
  } catch (e) { alert('保存失败: ' + e.message); }
}

async function changePassword() {
  const old_password = document.getElementById('pwOld').value;
  const new_password = document.getElementById('pwNew').value;
  if (!old_password || !new_password) return alert('请填写完整');
  try {
    await api('/password', { method: 'PUT', body: JSON.stringify({ old_password, new_password }) });
    alert('密码已修改');
    document.getElementById('pwOld').value = '';
    document.getElementById('pwNew').value = '';
  } catch (e) { alert('修改失败: ' + e.message); }
}

// ── Logs ──

let logFilter = '';
let logPage = 1;

async function renderLogs(el) {
  const params = new URLSearchParams({ page: logPage, page_size: 50 });
  if (logFilter) params.set('status', logFilter);
  const data = await api('/logs?' + params);
  const totalPages = Math.max(1, Math.ceil(data.total / data.page_size));

  el.innerHTML = `
    <div class="flex items-center justify-between mb-8">
      <div>
        <h2 class="text-3xl font-bold grad-text mb-1">Logs</h2>
        <p class="text-sm text-zinc-600">请求日志记录</p>
      </div>
      <div class="flex items-center gap-3">
        <select id="logFilterSel" onchange="filterLogs(this.value)" class="rounded-xl border border-white/10 bg-white/5 px-3 py-2 text-sm text-zinc-100">
          <option value="" ${!logFilter ? 'selected' : ''}>全部</option>
          <option value="success" ${logFilter === 'success' ? 'selected' : ''}>成功</option>
          <option value="error" ${logFilter === 'error' ? 'selected' : ''}>失败</option>
        </select>
        <label class="flex items-center gap-2 text-sm text-zinc-400">
          <input type="checkbox" id="autoRefreshCb" onchange="toggleAutoRefresh(this.checked)" ${autoRefreshTimer ? 'checked' : ''}
            class="rounded border-white/10 bg-white/5 text-brand-500">
          自动刷新
        </label>
      </div>
    </div>
    <div class="grad-border overflow-hidden">
      <div class="overflow-x-auto">
        <table class="w-full text-sm">
          <thead><tr class="text-zinc-500 text-left border-b border-white/5">
            <th class="px-6 py-3 font-medium">时间</th>
            <th class="px-6 py-3 font-medium">模型</th>
            <th class="px-6 py-3 font-medium">Token</th>
            <th class="px-6 py-3 font-medium">流式</th>
            <th class="px-6 py-3 font-medium">状态</th>
            <th class="px-6 py-3 font-medium">耗时</th>
            <th class="px-6 py-3 font-medium">错误</th>
          </tr></thead>
          <tbody>
            ${data.items.map(l => `<tr class="table-row border-b border-white/[0.03] transition-colors">
              <td class="px-6 py-3 text-zinc-500 whitespace-nowrap">${fmtTime(l.timestamp)}</td>
              <td class="px-6 py-3 text-zinc-200">${esc(l.model)}</td>
              <td class="px-6 py-3 text-zinc-500">${esc(l.token_name)}</td>
              <td class="px-6 py-3">${l.stream ? '<span class="text-brand-400">SSE</span>' : '<span class="text-zinc-500">JSON</span>'}</td>
              <td class="px-6 py-3">${statusBadge(l.status)}</td>
              <td class="px-6 py-3 text-zinc-500">${l.duration}s</td>
              <td class="px-6 py-3 text-red-400 text-xs max-w-xs truncate">${esc(l.error)}</td>
            </tr>`).join('') || '<tr><td colspan="7" class="px-6 py-12 text-center text-zinc-600">暂无日志</td></tr>'}
          </tbody>
        </table>
      </div>
      ${totalPages > 1 ? `
      <div class="flex items-center justify-between px-6 py-3 border-t border-white/5">
        <span class="text-sm text-zinc-500">共 ${data.total} 条</span>
        <div class="flex items-center gap-2">
          <button onclick="gotoLogPage(${logPage - 1})" ${logPage <= 1 ? 'disabled' : ''} class="rounded-lg bg-white/5 px-3 py-1.5 text-xs hover:bg-white/10 disabled:opacity-30 disabled:cursor-not-allowed transition-colors">上一页</button>
          <span class="text-sm text-zinc-400">${logPage} / ${totalPages}</span>
          <button onclick="gotoLogPage(${logPage + 1})" ${logPage >= totalPages ? 'disabled' : ''} class="rounded-lg bg-white/5 px-3 py-1.5 text-xs hover:bg-white/10 disabled:opacity-30 disabled:cursor-not-allowed transition-colors">下一页</button>
        </div>
      </div>` : ''}
    </div>`;
}

function filterLogs(val) { logFilter = val; logPage = 1; renderLogs(document.getElementById('pageContent')); }
function gotoLogPage(p) { logPage = p; renderLogs(document.getElementById('pageContent')); }
function toggleAutoRefresh(on) {
  if (autoRefreshTimer) { clearInterval(autoRefreshTimer); autoRefreshTimer = null; }
  if (on) {
    autoRefreshTimer = setInterval(() => {
      if (currentPage === 'logs') renderLogs(document.getElementById('pageContent'));
    }, 5000);
  }
}

// ── Helpers ──

function esc(s) { if (!s) return ''; const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

function fmtTime(ts) {
  if (!ts) return '-';
  try {
    const d = new Date(ts);
    return d.toLocaleString('zh-CN', { hour12: false, month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit', second: '2-digit' });
  } catch { return ts; }
}

function statusBadge(s) {
  const styles = {
    success: 'bg-emerald-500/10 text-emerald-400 border border-emerald-500/20',
    error: 'bg-red-500/10 text-red-400 border border-red-500/20',
    pending: 'bg-white/5 text-zinc-400 border border-white/10'
  };
  return `<span class="inline-flex items-center rounded-full px-2.5 py-0.5 text-xs font-medium ${styles[s] || styles.pending}">${s}</span>`;
}

// ── Init ──

render();
</script>
